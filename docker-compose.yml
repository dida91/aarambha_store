services:
  db:
    image: postgres:16
    container_name: aarambha_store_db
    environment:
      POSTGRES_DB: aarambha_store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: aarambha_store_redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: aarambha_store_backend
    env_file:
      - backend/.env.example
    environment:
      DB_ENGINE: postgres
      POSTGRES_DB: aarambha_store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  celery_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: aarambha_store_celery
    env_file:
      - backend/.env.example
    environment:
      DB_ENGINE: postgres
      POSTGRES_DB: aarambha_store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis
    command: celery -A config worker --loglevel=info

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: aarambha_store_frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
